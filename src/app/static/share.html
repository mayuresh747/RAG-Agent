<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Conversation — Seattle Regulatory Friction Observatory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* ── Share page: allow scroll, inherit all theme variables ── */
        html, body {
            overflow: auto;
            background: var(--bg-primary);
        }

        .share-app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 960px;   /* matches .app max-width */
            margin: 0 auto;
        }

        /* Content area mirrors .chat-area padding + dot-grid background */
        .share-content {
            flex: 1;
            padding: 36px 32px 64px;
            background-color: var(--bg-primary);
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.8' fill='%23ccc4b8' fill-opacity='0.35'/%3E%3C/svg%3E");
        }

        /* Conversation title block */
        .share-meta {
            margin-bottom: 32px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
        }

        .share-meta h2 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 400;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
            color: var(--text-primary);
            line-height: 1.25;
        }

        .share-meta-sub {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .share-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* Error state — consistent fonts */
        .share-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            gap: 10px;
            color: var(--text-secondary);
        }

        .share-error .error-icon {
            font-size: 36px;
            margin-bottom: 6px;
        }

        .share-error h3 {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 400;
            color: var(--text-primary);
        }

        .share-error p {
            font-family: var(--font-body);
            font-size: 14px;
            max-width: 360px;
            line-height: 1.65;
            color: var(--text-secondary);
        }

        /* "Open Chat Agent" link — matches .share-btn style */
        .chat-open-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            text-decoration: none;
            transition: var(--transition);
            margin-top: 10px;
        }

        .chat-open-link:hover {
            background: var(--text-primary);
            border-color: var(--text-primary);
            color: var(--bg-primary);
        }
    </style>
</head>
<body>
    <!-- Auth Modal — identical to main app -->
    <div class="auth-overlay" id="authModal" style="display: none;">
        <div class="auth-box">
            <div class="auth-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Access Required</h2>
            <p>Enter the access code to view this shared conversation.</p>
            <input type="password" id="apiKeyInput" class="auth-input" placeholder="Enter access key">
            <button id="authBtn" class="btn btn-primary auth-btn">Unlock</button>
            <p id="authError" class="auth-error"></p>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="share-app">
        <!-- Header — identical structure to main app header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <img src="/static/uw-logo.png" alt="UW" height="34"
                         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
                    <!-- Fallback SVG if image not yet copied -->
                    <svg viewBox="0 0 72 54" xmlns="http://www.w3.org/2000/svg" style="display:none;width:100%;height:100%">
                        <rect width="72" height="54" fill="white"/>
                        <polygon fill="#b7a57a" points="2,4 20,4 30,46 36,26 42,46 52,4 70,4 56,50 43,50 36,32 29,50 16,50"/>
                        <polygon fill="#4b2e83" points="6,7.5 18.5,7.5 29,43 36,26.5 43,43 53.5,7.5 66,7.5 54,47 43.5,47 36,30.5 28.5,47 18,47"/>
                    </svg>
                </div>
                <div class="header-title">
                    <h1>Seattle Regulatory Friction Observatory</h1>
                    <span class="header-subtitle">Shared conversation — read only</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="/" class="share-btn" title="Open the chat agent">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Open Chat Agent
                </a>
            </div>
        </header>

        <!-- Conversation content -->
        <main class="share-content" id="shareContent">
            <!-- Populated by JS -->
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
    <script>
    (function () {
        const authModal   = document.getElementById('authModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const authBtn     = document.getElementById('authBtn');
        const authError   = document.getElementById('authError');
        const content     = document.getElementById('shareContent');

        let apiKey = localStorage.getItem('rag_api_key') || '';

        const shareId = window.location.pathname.split('/share/')[1] || '';

        function checkAuth() {
            if (!apiKey) {
                authModal.style.display = 'flex';
            } else {
                authModal.style.display = 'none';
                loadShare();
            }
        }

        authBtn.addEventListener('click', submitAuth);
        apiKeyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitAuth();
        });

        function submitAuth() {
            const key = apiKeyInput.value.trim();
            if (!key) { authError.textContent = 'Please enter a key'; return; }
            apiKey = key;
            localStorage.setItem('rag_api_key', key);
            checkAuth();
        }

        async function loadShare() {
            content.innerHTML = '<div class="share-error"><p style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted)">Loading…</p></div>';

            const res = await fetch(`/api/share/${shareId}`, {
                headers: { 'x-api-key': apiKey }
            });

            if (res.status === 403) {
                localStorage.removeItem('rag_api_key');
                apiKey = '';
                authError.textContent = 'Invalid access key.';
                authModal.style.display = 'flex';
                content.innerHTML = '';
                return;
            }

            if (res.status === 410) {
                renderError('Link expired', 'This shared conversation link has expired. Links are valid for 30 days.');
                return;
            }

            if (res.status === 404) {
                renderError('Not found', 'This shared conversation link does not exist or has been removed.');
                return;
            }

            if (!res.ok) {
                renderError('Error', 'Something went wrong loading this conversation. Please try again.');
                return;
            }

            const data = await res.json();
            renderConversation(data);
        }

        function renderError(title, message) {
            content.innerHTML = `
                <div class="share-error">
                    <div class="error-icon">&#128274;</div>
                    <h3>${escapeHtml(title)}</h3>
                    <p>${escapeHtml(message)}</p>
                    <a href="/" class="chat-open-link">Open Chat Agent</a>
                </div>`;
        }

        function renderConversation(data) {
            const sharedOn  = new Date(data.created_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            const expiresOn = new Date(data.expires_at).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });

            let html = `
                <div class="share-meta">
                    <div class="share-badge">Shared conversation</div>
                    <h2>${escapeHtml(data.title)}${data.title.length >= 80 ? '…' : ''}</h2>
                    <div class="share-meta-sub">Shared on ${sharedOn} &nbsp;·&nbsp; Expires ${expiresOn}</div>
                </div>`;

            data.conversation.forEach(msg => {
                const role = msg.role === 'user' ? 'user' : 'assistant';
                const avatarLabel = role === 'user' ? 'U' : 'AI';
                const bubbleContent = role === 'user'
                    ? escapeHtml(msg.content)
                    : renderMarkdown(msg.content);

                html += `
                    <div class="message message-${role}">
                        <div class="message-avatar">${avatarLabel}</div>
                        <div class="message-content">
                            <div class="message-bubble">${bubbleContent}</div>
                        </div>
                    </div>`;
            });

            content.innerHTML = html;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function renderMarkdown(text) {
            if (!text) return '';
            try {
                const rawHtml = marked.parse(text, { breaks: true });
                let clean = DOMPurify.sanitize(rawHtml);
                // Highlight "Source N" citation references — same as main app
                clean = clean.replace(/\b([Ss]ource)\s+(\d+)\b/g,
                    '<span class="citation-ref">Source&nbsp;$2</span>');
                return clean;
            } catch (e) {
                const d = document.createElement('div');
                d.textContent = text;
                return d.innerHTML;
            }
        }

        checkAuth();
    })();
    </script>
</body>
</html>
